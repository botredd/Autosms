<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 SMS Marketing - TextBelt</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.03);
            --accent: #00ff88;
            --accent-dim: rgba(0,255,136,0.1);
            --accent-glow: rgba(0,255,136,0.3);
            --text-primary: #ffffff;
            --text-secondary: #888;
            --danger: #ff4757;
            --warning: #ffa500;
            --border: rgba(255,255,255,0.08);
        }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at top, rgba(0,255,136,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0,100,255,0.03) 0%, transparent 50%);
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        
        h1 span {
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
        }
        
        .api-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-dim);
            border: 1px solid rgba(0,255,136,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            margin-top: 15px;
            font-size: 0.85em;
            color: var(--accent);
        }
        
        .api-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: rgba(0,255,136,0.3);
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .card h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85em;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-danger {
            background: rgba(255,71,87,0.15);
            color: var(--danger);
            border: 1px solid rgba(255,71,87,0.3);
        }
        
        .btn-danger:hover {
            background: rgba(255,71,87,0.25);
        }
        
        .btn-sm {
            padding: 8px 14px;
            font-size: 0.8em;
            border-radius: 8px;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1em;
        }
        
        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .phone-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .phone-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .phone-list::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .phone-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .phone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        
        .phone-item:hover {
            border-color: var(--accent);
            background: rgba(0,255,136,0.03);
        }
        
        .phone-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1em;
            color: var(--text-primary);
        }
        
        .phone-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .phone-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-pending {
            background: rgba(255,165,0,0.15);
            color: var(--warning);
        }
        
        .status-sent {
            background: var(--accent-dim);
            color: var(--accent);
        }
        
        .status-error {
            background: rgba(255,71,87,0.15);
            color: var(--danger);
        }
        
        .message-preview {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
        }
        
        .preview-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .preview-text {
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 0.95em;
        }
        
        .char-count {
            text-align: right;
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .char-count.warning {
            color: var(--warning);
        }
        
        .char-count.danger {
            color: var(--danger);
        }
        
        .log {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8em;
        }
        
        .log-entry {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            word-break: break-word;
        }
        
        .log-entry::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }
        
        .log-info { background: rgba(100,100,255,0.1); color: #aaa; }
        .log-info::before { background: #666; }
        
        .log-success { background: var(--accent-dim); color: var(--accent); }
        .log-success::before { background: var(--accent); }
        
        .log-error { background: rgba(255,71,87,0.1); color: var(--danger); }
        .log-error::before { background: var(--danger); }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #7dd3fc;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 SMS <span>Marketing</span></h1>
            <p class="subtitle">Panel de envío masivo con TextBelt</p>
            <div class="api-badge">
                <span>TextBelt v3</span>
            </div>
        </header>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalNumbers">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sentCount">0</div>
                <div class="stat-label">Enviados</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="quotaRemaining">--</div>
                <div class="stat-label">Créditos</div>
            </div>
        </div>
        
        <!-- API Key Config -->
        <div class="card">
            <h2>Configuración API</h2>
            <div class="form-group">
                <label>TextBelt API Key</label>
                <input type="text" id="apiKey" placeholder="Tu API key de TextBelt" value="64dbe77f627f460aac9df498ef0bc6b500633a442hBpVALNkb3wtls8kmIFHNdLs">
            </div>
            <button class="btn btn-primary" onclick="checkQuota()" id="btnQuota">
                🔄 Verificar Créditos
            </button>
        </div>
        
        <!-- Message Composer -->
        <div class="card">
            <h2>Mensaje</h2>
            <div class="form-group">
                <label>Escribe tu mensaje (máx. 160 caracteres para 1 SMS)</label>
                <textarea id="messageText" placeholder="Escribe tu mensaje aquí...">Hola! Rento páginas MegaPersonals con bot que publica cada 15min 24/7. $125/sem. Panel para ver/editar tu anuncio. Prueba 24h GRATIS!💕 Info: +1 829 965 3145</textarea>
            </div>
            <div class="char-count"><span id="charCount">0</span> / 160 caracteres</div>
            <div class="message-preview">
                <div class="preview-label">Vista previa</div>
                <div class="preview-text" id="previewText"></div>
            </div>
        </div>
        
        <!-- Add Numbers -->
        <div class="card">
            <h2>Agregar Números</h2>
            <div class="form-group">
                <label>Pega los números (uno por línea) - Formato US: +1XXXXXXXXXX</label>
                <textarea id="numbersInput" placeholder="Ejemplo:
+1 555 123 4567
555-987-6543
(555) 456-7890"></textarea>
            </div>
            <div class="actions-row">
                <button class="btn btn-primary" onclick="addNumbers()">
                    ➕ Agregar Números
                </button>
                <button class="btn btn-danger" onclick="clearAll()">
                    🗑️ Limpiar Todo
                </button>
            </div>
        </div>
        
        <!-- Phone List -->
        <div class="card">
            <h2>Lista de Números</h2>
            <div class="phone-list" id="phoneList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No hay números agregados</p>
                </div>
            </div>
            <div class="actions-row" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="sendAllPending()" id="btnSendAll">
                    🚀 Enviar Todos los Pendientes
                </button>
                <button class="btn btn-danger" onclick="resetErrors()">
                    🔄 Reintentar Errores
                </button>
            </div>
        </div>
        
        <!-- Log -->
        <div class="card">
            <h2>Registro de Actividad</h2>
            <div class="log" id="logContainer">
                <div class="log-entry log-info">Sistema iniciado - TextBelt API v3</div>
            </div>
            <div class="actions-row">
                <button class="btn btn-danger btn-sm" onclick="clearLog()">🗑️ Limpiar Log</button>
            </div>
        </div>
    </div>
    
    <script>
        // Lista de números
        let phoneNumbers = JSON.parse(localStorage.getItem('textbeltPhoneNumbers') || '[]');
        let isSending = false;
        
        // API Key
        const API_KEY = '64dbe77f627f460aac9df498ef0bc6b500633a442hBpVALNkb3wtls8kmIFHNdLs';
        
        // Elementos del DOM
        const messageText = document.getElementById('messageText');
        const charCount = document.getElementById('charCount');
        const previewText = document.getElementById('previewText');
        
        // Actualizar vista previa del mensaje
        function updatePreview() {
            const text = messageText.value;
            charCount.textContent = text.length;
            previewText.textContent = text || 'Tu mensaje aparecerá aquí...';
            
            const charCountEl = document.querySelector('.char-count');
            charCountEl.classList.remove('warning', 'danger');
            
            if (text.length > 160) {
                charCountEl.classList.add('danger');
            } else if (text.length > 140) {
                charCountEl.classList.add('warning');
            }
        }
        
        messageText.addEventListener('input', updatePreview);
        updatePreview();
        
        // Verificar créditos restantes
        async function checkQuota() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const btn = document.getElementById('btnQuota');
            
            if (!apiKey) {
                addLog('Por favor ingresa tu API Key', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Verificando...';
            
            try {
                addLog('Verificando créditos...', 'info');
                
                const response = await fetch(`https://textbelt.com/quota/${apiKey}`);
                const data = await response.json();
                
                if (data.quotaRemaining !== undefined) {
                    document.getElementById('quotaRemaining').textContent = data.quotaRemaining;
                    addLog(`✓ Créditos disponibles: ${data.quotaRemaining}`, 'success');
                } else {
                    addLog('Error: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                addLog('Error de conexión: ' + error.message, 'error');
            }
            
            btn.disabled = false;
            btn.innerHTML = '🔄 Verificar Créditos';
        }
        
        // Limpiar número de teléfono
        function cleanPhoneNumber(phone) {
            let cleaned = phone.replace(/[^\d+]/g, '');
            
            // Si no tiene código de país, asumir US (+1)
            if (cleaned.length === 10) {
                cleaned = '+1' + cleaned;
            } else if (cleaned.length === 11 && cleaned.startsWith('1')) {
                cleaned = '+' + cleaned;
            } else if (!cleaned.startsWith('+')) {
                cleaned = '+' + cleaned;
            }
            
            // Validar longitud mínima (debe tener al menos 11 dígitos con +1)
            if (cleaned.replace(/\D/g, '').length < 11) {
                return null;
            }
            
            return cleaned;
        }
        
        // Agregar números
        function addNumbers() {
            const input = document.getElementById('numbersInput').value;
            const lines = input.split('\n').filter(line => line.trim());
            
            let added = 0;
            let duplicates = 0;
            let invalid = 0;
            
            lines.forEach(line => {
                const cleaned = cleanPhoneNumber(line);
                
                if (cleaned) {
                    if (phoneNumbers.find(p => p.number === cleaned)) {
                        duplicates++;
                    } else {
                        phoneNumbers.push({
                            number: cleaned,
                            status: 'pending',
                            addedAt: Date.now()
                        });
                        added++;
                    }
                } else {
                    invalid++;
                }
            });
            
            saveNumbers();
            renderPhoneList();
            updateStats();
            
            document.getElementById('numbersInput').value = '';
            
            addLog(`✓ Agregados: ${added} | Duplicados: ${duplicates} | Inválidos: ${invalid}`, added > 0 ? 'success' : 'info');
        }
        
        // Guardar números
        function saveNumbers() {
            localStorage.setItem('textbeltPhoneNumbers', JSON.stringify(phoneNumbers));
        }
        
        // Renderizar lista
        function renderPhoneList() {
            const container = document.getElementById('phoneList');
            
            if (phoneNumbers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>No hay números agregados</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = phoneNumbers.map((phone, index) => {
                let statusClass = 'status-pending';
                let statusText = 'Pendiente';
                
                if (phone.status === 'sent') {
                    statusClass = 'status-sent';
                    statusText = '✓ Enviado';
                } else if (phone.status === 'error') {
                    statusClass = 'status-error';
                    statusText = '✗ Error';
                } else if (phone.status === 'sending') {
                    statusClass = 'status-pending';
                    statusText = '⏳ Enviando...';
                }
                
                return `
                    <div class="phone-item">
                        <div class="phone-number">${phone.number}</div>
                        <div class="phone-actions">
                            <span class="phone-status ${statusClass}">${statusText}</span>
                            ${phone.status === 'pending' && !isSending ? `
                                <button class="btn btn-primary btn-icon" onclick="sendSingle(${index})" title="Enviar">📤</button>
                            ` : ''}
                            <button class="btn btn-danger btn-icon" onclick="removeNumber(${index})" title="Eliminar">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Actualizar stats
        function updateStats() {
            document.getElementById('totalNumbers').textContent = phoneNumbers.length;
            document.getElementById('sentCount').textContent = phoneNumbers.filter(p => p.status === 'sent').length;
            document.getElementById('pendingCount').textContent = phoneNumbers.filter(p => p.status === 'pending').length;
        }
        
        // Enviar SMS individual
        async function sendSingle(index) {
            await sendSMS(phoneNumbers[index].number, index);
        }
        
        // Enviar todos los pendientes
        async function sendAllPending() {
            const pending = phoneNumbers.filter(p => p.status === 'pending');
            const btn = document.getElementById('btnSendAll');
            
            if (pending.length === 0) {
                addLog('No hay mensajes pendientes', 'info');
                return;
            }
            
            isSending = true;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Enviando...';
            
            addLog(`🚀 Enviando ${pending.length} mensajes...`, 'info');
            
            for (let i = 0; i < phoneNumbers.length; i++) {
                if (phoneNumbers[i].status === 'pending') {
                    await sendSMS(phoneNumbers[i].number, i);
                    // Esperar 2 segundos entre mensajes
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }
            
            isSending = false;
            btn.disabled = false;
            btn.innerHTML = '🚀 Enviar Todos los Pendientes';
            
            addLog('✓ Envío completado', 'success');
            checkQuota();
        }
        
        // Enviar SMS usando TextBelt
        async function sendSMS(toNumber, index) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const message = document.getElementById('messageText').value;
            
            if (!apiKey) {
                addLog('Error: Ingresa tu API Key', 'error');
                return;
            }
            
            if (!message) {
                addLog('Error: Escribe un mensaje', 'error');
                return;
            }
            
            phoneNumbers[index].status = 'sending';
            renderPhoneList();
            
            try {
                addLog(`Enviando a ${toNumber}...`, 'info');
                
                // Envío directo a TextBelt usando fetch con form data
                const formData = new URLSearchParams();
                formData.append('phone', toNumber);
                formData.append('message', message);
                formData.append('key', apiKey);
                
                const response = await fetch('https://textbelt.com/text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString()
                });
                
                const data = await response.json();
                
                console.log('TextBelt response:', data);
                
                if (data.success) {
                    phoneNumbers[index].status = 'sent';
                    phoneNumbers[index].sentAt = Date.now();
                    phoneNumbers[index].textId = data.textId;
                    addLog(`✓ Enviado a ${toNumber} (ID: ${data.textId})`, 'success');
                } else {
                    phoneNumbers[index].status = 'error';
                    phoneNumbers[index].error = data.error;
                    addLog(`✗ Error ${toNumber}: ${data.error}`, 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                phoneNumbers[index].status = 'error';
                phoneNumbers[index].error = error.message;
                addLog(`✗ Error ${toNumber}: ${error.message}`, 'error');
            }
            
            saveNumbers();
            renderPhoneList();
            updateStats();
        }
        
        // Remover número
        function removeNumber(index) {
            phoneNumbers.splice(index, 1);
            saveNumbers();
            renderPhoneList();
            updateStats();
        }
        
        // Limpiar todo
        function clearAll() {
            if (confirm('¿Eliminar todos los números?')) {
                phoneNumbers = [];
                saveNumbers();
                renderPhoneList();
                updateStats();
                addLog('Lista limpiada', 'info');
            }
        }
        
        // Reintentar errores
        function resetErrors() {
            let count = 0;
            phoneNumbers.forEach(p => {
                if (p.status === 'error') {
                    p.status = 'pending';
                    delete p.error;
                    count++;
                }
            });
            saveNumbers();
            renderPhoneList();
            updateStats();
            addLog(`${count} números marcados para reintento`, 'info');
        }
        
        // Limpiar log
        function clearLog() {
            document.getElementById('logContainer').innerHTML = '<div class="log-entry log-info">Log limpiado</div>';
        }
        
        // Agregar al log
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            entry.textContent = `[${time}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // Inicializar
        renderPhoneList();
        updateStats();
        
        // Verificar créditos al cargar
        setTimeout(checkQuota, 1500);
    </script>
</body>
</html>
